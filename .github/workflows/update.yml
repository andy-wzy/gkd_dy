name: Update Subscription

on:
  workflow_dispatch:

  schedule:
    # GitHub Actions 不支持 "每20天"
    # 这里设置为每月 1 日和 21 日执行
    - cron: "0 0 1,21 * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 拉取仓库
      - uses: actions/checkout@v5

      # Node 环境
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # 安装依赖
      - name: Install dependencies
        run: npm install

      # 同步订阅源
      - name: Sync upstream sources
        run: npm run sync

      # 构建订阅
      - name: Build subscription
        run: npm run build

      # 输出统计信息
      - name: Show statistics
        run: |
          echo "========== BUILD REPORT =========="
          cat reports/statistics.json || echo "statistics not found"
          echo "=================================="

      # 提交变更
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --staged --quiet || git commit -m "auto update subscription"

          git push
